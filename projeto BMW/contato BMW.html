<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato BMW</title>
    <style>
      body {
        background-repeat: no-repeat;
        background-color: #eaeaea;
        background-image: url(https://bmw.scene7.com/is/image/BMW/g82_cs_design-positioning?wid=3000&hei=3000);
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <h1>Entre em contato conosco</h1>
    <h2>(ajuda:contato:etc)</h2>
    <center>
      <form>
        <table>
          <tr>
            <td>
              <input type="text" name="nome" placeholder="Insira seu nome" />
              <label for="nome"> Nome completo:</label>
            </td>
          </tr>
          <tr>
            <td>
              <input
                type="text"
                name="email"
                id="email"
                placeholder="Insira seu
              E-mail"
              />

              <label for="email">E-mail:</label>
            </td>
          </tr>
          <tr>
            <td>
              <input
                type="text"
                name="end"
                id="informaçao"
                placeholder="fale o que precisa aqui!"
                size="100"
              />
              <label for="fale conosco"> fale conosco:</label>
            </td>
          </tr>
          <tr>
            <td>
              <input type="submit" />
            </td>
          </tr>
        </table>
      </form>
    </center>
    <br />
  </body>
</html>
